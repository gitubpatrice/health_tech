name: health_tech
description: "Health Tech - Gestion clients, animaux et seances pour praticiens bien-etre."
publish_to: 'none'
version: 1.5.5+1

environment:
  sdk: ^3.11.5
  flutter: ">=3.41.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Database (encrypted) — sqlcipher_flutter_libs already bundles SQLite +
  # SQLCipher; do NOT add sqlite3_flutter_libs (drift_flutter pulls it
  # transitively, which collides with sqlcipher's plugin class at dexing).
  drift: ^2.21.0
  sqlcipher_flutter_libs: ^0.6.4
  # sqlite3 is the Dart binding (no native .so of its own); we use it only
  # to redirect open.overrideFor → openCipherOnAndroid in main().
  sqlite3: ^2.4.7

  # Crypto & secure storage
  flutter_secure_storage: ^9.2.2
  cryptography: ^2.7.0
  cryptography_flutter: ^2.3.2

  # Preferences
  shared_preferences: ^2.3.4

  # Runtime app metadata (version is read from PackageInfo, not hardcoded)
  package_info_plus: ^8.1.4

  # Files & paths
  path_provider: ^2.1.5
  path: ^1.9.1
  file_picker: ^8.1.7
  share_plus: ^10.1.3

  # Images
  image: ^4.5.4

  # PDF export
  pdf: ^3.11.3
  printing: ^5.13.4

  # Calendar integration (system bridge)
  device_calendar: ^4.3.3
  timezone: ^0.9.4
  flutter_timezone: ^3.0.1

  # Local notifications (appointment reminders) — runs on-device only,
  # no Firebase / FCM. Uses AlarmManager + NotificationManager on Android.
  flutter_local_notifications: ^17.2.4

  # Monthly calendar widget
  table_calendar: ^3.1.3

  # Archive (ZIP) for GDPR data export
  archive: ^4.0.4

  # Utils
  collection: ^1.19.0
  intl: ^0.20.1
  uuid: ^4.5.1
  cupertino_icons: ^1.0.8

  # Note: audited primitives (atomic_write, image_bounds) are in-tree under
  # lib/utils/ rather than pulled from files_tech_core, so the project
  # builds standalone on a CI runner without the sibling repo checked out.

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Drift codegen
  drift_dev: ^2.21.0
  build_runner: ^2.4.13

  # Riverpod codegen
  riverpod_generator: ^2.6.3
  custom_lint: ^0.7.0
  riverpod_lint: ^2.6.3

  # Génération des icônes mipmap Android (5 densités + adaptive icon).
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#262660"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/icon/app_icon.png
    - assets/legal/
